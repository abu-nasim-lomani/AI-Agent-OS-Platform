# Local dev stack — S0-02
# নিয়ম embodied: queue-Redis ও cache-Redis আলাদা instance (docs/13 Q3/A1)
name: agentos

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_dev
      POSTGRES_DB: agentos
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 5s
      retries: 10

  # cache-Redis: eviction চালু — হারালে ক্ষতি নেই
  redis-cache:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  # queue-Redis: AOF persistence, eviction নিষেধ — job হারানো যাবে না
  redis-queue:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    ports:
      - "6380:6379"
    volumes:
      - ./.data/redis-queue:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentos
      MINIO_ROOT_PASSWORD: agentos_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data

  # bucket auto-create (one-shot)
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 agentos agentos_dev &&
      mc mb -p local/knowledge || true
      "
